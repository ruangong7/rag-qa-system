<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>RAG Assistant</h1>
          <p>Qwen-Max · ChromaDB · Citation Grounded</p>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>会话</h2>
          </div>
          <div class="meta-grid">
            <div class="meta-item">
              <span class="meta-label">Session ID</span>
              <span id="sessionId" class="meta-value">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">系统状态</span>
              <span id="healthStatus" class="meta-value">Checking</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">索引文档</span>
              <span id="docCount" class="meta-value">-</span>
            </div>
          </div>
          <button id="newSessionBtn" class="secondary-btn" type="button">新建会话</button>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>示例问题</h2>
          </div>
          <div class="example-list">
            <button class="example-btn" type="button" data-question="员工手册中关于年假的规定是什么？">员工手册中关于年假的规定是什么？</button>
            <button class="example-btn" type="button" data-question="What is the annual leave entitlement for junior employees?">What is the annual leave entitlement for junior employees?</button>
            <button class="example-btn" type="button" data-question="数据泄露后需要在多久内通知监管机构？">数据泄露后需要在多久内通知监管机构？</button>
            <button class="example-btn" type="button" data-question="What are the main responsibilities of the search service?">What are the main responsibilities of the search service?</button>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <section class="chat-panel">
          <header class="chat-header">
            <div>
              <h2>对话</h2>
              <p id="requestMeta" class="subtle">Ready</p>
            </div>
          </header>

          <div id="errorBanner" class="error-banner hidden"></div>

          <div id="messageList" class="message-list">
            <div class="welcome-card">
              <h3>开始提问</h3>
              <p>支持中英文问题、多轮会话、引用答案和检索证据查看。</p>
            </div>
          </div>

          <div class="composer">
            <textarea id="questionInput" rows="3" placeholder="输入你的问题，Ctrl+Enter 发送"></textarea>
            <div class="composer-actions">
              <button id="sendBtn" class="primary-btn" type="button">发送</button>
            </div>
          </div>
        </section>

        <aside class="inspector">
          <section class="panel inspector-panel">
            <div class="panel-head">
              <h2>回答信息</h2>
            </div>
            <div class="pill-row">
              <span id="confidencePill" class="pill">Confidence -</span>
              <span id="latencyPill" class="pill">Latency -</span>
            </div>
          </section>

          <section class="panel inspector-panel">
            <div class="panel-head">
              <h2>引用</h2>
            </div>
            <div id="citationsEmpty" class="empty-state">暂无引用</div>
            <div id="citationsList" class="stack-list hidden"></div>
          </section>

          <section class="panel inspector-panel">
            <div class="panel-head">
              <h2>检索片段</h2>
            </div>
            <div id="contextsEmpty" class="empty-state">暂无检索片段</div>
            <div id="contextsList" class="stack-list hidden"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
